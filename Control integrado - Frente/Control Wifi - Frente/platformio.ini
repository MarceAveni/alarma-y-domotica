; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp07s]
platform = espressif8266
board = esp07
framework = arduino
lib_deps = 
    PubSubClient
    adafruit/DHT sensor library@^1.4.4
    bblanchon/ArduinoJson@^6.19.4
upload_protocol = espota        ;Comentar para programación SERIAL
;upload_port = COM4             ;Comentar para programación OTA
upload_port = Control_Frente    ;Comentar para programación SERIAL (Control_Frente)
upload_flags =                  ;Comentar para programación SERIAL
    --auth=Aveni793             ;Comentar para programación SERIAL